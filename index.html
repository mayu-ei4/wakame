<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Terminal - System Login</title>
    <style>
        body {
            background-color: #000000;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
        }
        #terminal {
            width: 100%;
        }
        .log-line {
            margin: 5px 0;
            white-space: pre-wrap;
        }
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 15px;
            background: #111;
            padding: 10px;
            border: 1px solid #00ff00;
        }
        .prompt {
            color: #00ff00;
            margin-right: 10px;
            font-weight: bold;
        }
        input {
            background: #222;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: inherit;
            font-size: 18px;
            outline: none;
            flex-grow: 1;
            padding: 5px;
        }
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="log">
            <div class="log-line">Welcome to Ubuntu 22.04.3 LTS (GNU/Linux 5.15.0-generic x86_64)</div>
            <div class="log-line">Last login: Sat Jun 13 17:44:02 2026 from 192.168.1.15</div>
            <div class="log-line"> </div>
        </div>
        <div class="input-line">
            <span class="prompt">user@wakame-server:~$</span>
            <input type="text" id="cmd-input" placeholder="ここにコマンドを入力してEnter" autofocus autocomplete="off">
        </div>
    </div>

    <div id="video-container">
        <button class="close-btn" onclick="closeVideo()">[X] CLOSE TERMINAL SESSION</button>
        <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd-input');
        const log = document.getElementById('log');
        const videoContainer = document.getElementById('video-container');
        const player = document.getElementById('player');

        document.addEventListener('click', () => cmdInput.focus());

        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const fullCmd = this.value.trim();
                this.value = ''; 

                printLog(`user@wakame-server:~$ ${fullCmd}`);

                // コマンドを正確に分割する処理に変更
                const args = fullCmd.split(' ');
                const baseCmd = args[0];

                if (fullCmd === '') return;

                           // 隠しコマンドの判定部分
                       if (fullCmd.startsWith('/run play ')) {
                const videoId = fullCmd.replace('/run play ', '').trim();
                printLog("Connecting to secure proxy backend...");
                printLog("Streaming thread initialized.");
                
                setTimeout(() => {
                    // ここが正しいURLです
                    player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";

                    videoContainer.style.display = 'block';
                }, 500);

            } else if (baseCmd === 'help' || baseCmd === 'ls') {
                printLog("Available commands: ls, cd, cat, clear, exit");

                    printLog(`bash: ${baseCmd}: command not found`);
                }
            }
        });

        function printLog(text) {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerText = text;
            log.appendChild(line);
        }

        function closeVideo() {
            videoContainer.style.display = 'none';
            player.src = ''; 
            printLog("Session closed safely.");
        }
    </script>
</body>
</html>
