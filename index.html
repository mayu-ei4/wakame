<!DOCTYPE html>
<html lang="ja" style="background-color: #000000; color: #00ff00;">
<head>
    <meta charset="UTF-8">
    <title>Terminal - System Login</title>
    <style>
        html, body {
            background-color: #000000 !important;
            color: #00ff00 !important;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #terminal {
            width: 100%;
            height: 100%;
        }
        .log-line {
            margin: 5px 0;
            white-space: pre-wrap;
        }
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 15px;
            background: transparent !important;
            padding: 0;
            border: none !important;
        }
        .prompt {
            color: #00ff00;
            margin-right: 10px;
            font-weight: bold;
        }
        input {
            background: transparent !important;
            border: none !important;
            color: #00ff00 !important;
            font-family: inherit;
            font-size: 18px;
            outline: none;
            flex-grow: 1;
            padding: 5px;
        }
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.7);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="log">
            <div class="log-line">Welcome to Ubuntu 22.04.3 LTS (GNU/Linux 5.15.0-generic x86_64)</div>
            <div class="log-line">Last login: Sat Jun 13 17:44:02 2026 from 192.168.1.15</div>
            <div class="log-line"> </div>
        </div>
        <div class="input-line">
            <span class="prompt">user@wakame-server:~$</span>
            <input type="text" id="cmd-input" autofocus autocomplete="off">
        </div>
    </div>

    <div id="video-container">
        <button class="close-btn" onclick="closeVideo()">[X] CLOSE TERMINAL SESSION</button>
        <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        const cmdInput = document.getElementById('cmd-input');
        const log = document.getElementById('log');
        const videoContainer = document.getElementById('video-container');
        const player = document.getElementById('player');

        document.addEventListener('click', () => cmdInput.focus());

        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const fullCmd = this.value.trim();
                this.value = ''; 

                printLog(`user@wakame-server:~$ ${fullCmd}`);

                if (fullCmd === '') return;

                // 隠しコマンドの判定（ここをバグが出ない安全な書き方に統一）
                if (fullCmd.startsWith('/run play ')) {
                    const videoId = fullCmd.replace('/run play ', '').trim();
                    printLog("Connecting to secure proxy backend...");
                    printLog("Streaming thread initialized.");
                    
                    setTimeout(() => {
                       player.src = "https://youtube.com" + videoId + "?autoplay=1";

                        videoContainer.style.display = 'block';
                    }, 500);

                } else if (fullCmd === 'help' || fullCmd === 'ls') {
                    printLog("Available commands: ls, cd, cat, clear, exit");
                } else if (fullCmd === 'clear') {
                    log.innerHTML = '';
                } else {
                    printLog(`bash: ${fullCmd}: command not found`);
                }
                
                window.scrollTo(0, document.body.scrollHeight);
            }
        });

        function printLog(text) {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerText = text;
            log.appendChild(line);
        }

        function closeVideo() {
            videoContainer.style.display = 'none';
            player.src = ''; 
            printLog("Session closed safely.");
        }
    </script>
</body>
</html>
